#
# Crowdin 配置文件
# 直接上传文档源文件(.rst)，由 Crowdin 平台进行翻译
#
# 前置要求：
#   1. 在 https://crowdin.com 创建项目
#   2. 生成 Personal Access Token (https://crowdin.com/settings#api-key)
#   3. 在 GitHub 仓库设置中添加以下 Secrets：
#      - CROWDIN_PROJECT_ID: Crowdin 项目数字 ID
#      - CROWDIN_PERSONAL_TOKEN: Crowdin 个人访问令牌
#
# 安装 Crowdin CLI（本地调试）:
#   npm i -g @crowdin/cli
#   或见 https://crowdin.github.io/crowdin-cli/installation
#
# 常用命令:
#   crowdin upload sources      - 上传源文件(.rst)到 Crowdin
#   crowdin download            - 下载翻译后的文档
#   crowdin status              - 查看翻译进度
#

"project_id_env": "CROWDIN_PROJECT_ID"
"api_token_env": "CROWDIN_PERSONAL_TOKEN"
"base_path": "."
"base_url": "https://api.crowdin.com"

"preserve_hierarchy": true

"files": [
  {
    # 文档源文件：直接上传 .rst 由 Crowdin 翻译
    "source": "/docs/**/*.rst",
    # 翻译后的文件下载路径
    # %locale_with_underscore% 会将 zh-CN 转换为 zh_CN
    "translation": "/docs/locales/%locale_with_underscore%/%original_file_name%",
    # 排除不需要翻译的文件和目录
    "ignore": [
      "/docs/_build/**",
      "/docs/_static/**",
      "/docs/_templates/**",
      "/docs/locales/**",
      "/docs/Makefile",
      "/docs/make.bat"
    ],
    # 语言代码映射：Crowdin 默认格式与项目使用的 locale 格式对应
    "languages_mapping": {
      "locale_with_underscore": {
        "zh-CN": "zh_CN"
      }
    }
  }
]
