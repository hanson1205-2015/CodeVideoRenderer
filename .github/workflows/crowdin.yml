name: Crowdin Sync

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'docs/**.rst'
      - 'docs/conf.py'
  # 允许手动触发
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  synchronize-with-crowdin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crowdin Sync
        uses: crowdin/github-action@v2
        with:
          # 上传文档源文件(.rst)到 Crowdin
          upload_sources: true
          # 从 Crowdin 下载翻译后的文档
          download_translations: true
          # 创建包含翻译更新的 Pull Request
          create_pull_request: true
          pull_request_title: 'docs(i18n): sync translations from Crowdin'
          pull_request_body: |
            此 PR 包含从 Crowdin 同步的最新文档翻译更新。
            
            - 源文件已上传至 Crowdin
            - 最新的翻译文件已下载到 `docs/locales/`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
